<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="書類管理">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>書類管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f6f3;--surface:#fff;--surface2:#f0efe9;
  --border:#e4e2da;--border2:#ccc9be;
  --text:#1a1a18;--text2:#6b6860;--text3:#a09d94;
  --accent:#2d5a3d;--accent-bg:#e8f0ea;
  --danger:#e2534a;--danger-bg:#fff0ef;
  --warn-bg:#faeeda;--warn-border:#e4c97a;--warn-text:#633806;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#141412;--surface:#1e1e1b;--surface2:#252520;
  --border:#2e2e28;--border2:#3a3a32;
  --text:#f0efe9;--text2:#a09d94;--text3:#6b6860;
  --accent:#5d9e72;--accent-bg:#1a2e20;
  --danger:#f87171;--danger-bg:#2a1010;
  --warn-bg:#2a2010;--warn-border:#6b5020;--warn-text:#e4c97a;
}}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}
button{font-family:inherit;cursor:pointer}
input,select{font-family:inherit}

/* ── Topbar ── */
.topbar{display:flex;align-items:center;gap:12px;padding:11px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.logo{display:flex;align-items:center;gap:9px}
.logo-icon{width:30px;height:30px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:16px;height:16px;fill:white}
.logo-name{font-size:14px;font-weight:700}
.search-wrap{flex:1;max-width:340px;position:relative;margin-left:auto}
.search-wrap .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;fill:var(--text3)}
#search-input{width:100%;padding:7px 10px 7px 32px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);outline:none}
#search-input:focus{border-color:var(--accent)}
#search-input::placeholder{color:var(--text3)}
.topbar-btns{display:flex;gap:7px}
.btn-icon{display:flex;align-items:center;gap:5px;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--surface2);color:var(--text2);white-space:nowrap;transition:background .12s}
.btn-icon:hover{background:var(--border)}
.btn-icon svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8}
.btn-primary-sm{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary-sm:hover{opacity:.88;background:var(--accent)}
.btn-primary-sm svg{stroke:white}

/* ── Layout ── */
.body{display:flex;flex:1;overflow:hidden}
.sidebar{width:172px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:10px 7px;display:flex;flex-direction:column;gap:2px}
.sb-head{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.07em;padding:5px 10px 3px;text-transform:uppercase}
.cat-btn{display:flex;align-items:center;gap:7px;width:100%;padding:6px 9px;border:none;background:transparent;border-radius:7px;text-align:left;font-size:13px;color:var(--text2);transition:background .1s}
.cat-btn:hover{background:var(--surface2)}
.cat-btn.active{background:var(--accent-bg);color:var(--accent);font-weight:500}
.cat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cat-lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-cnt{font-size:11px;color:var(--text3);background:var(--surface2);border-radius:20px;padding:1px 6px}
.cat-btn.active .cat-cnt{background:var(--accent-bg);color:var(--accent)}
.sb-divider{height:1px;background:var(--border);margin:6px 4px}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.toolbar{display:flex;align-items:center;gap:7px;padding:9px 18px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.sort-lbl{font-size:12px;color:var(--text3)}
.sort-btn{font-size:12px;padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);transition:all .1s}
.sort-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.storage-info{margin-left:auto;font-size:11px;color:var(--text3)}
.doc-cnt{font-size:12px;color:var(--text3)}

/* ── Drop overlay (full-screen drag feedback) ── */
.drop-overlay{position:fixed;inset:0;background:rgba(45,90,61,.12);border:3px solid var(--accent);z-index:1000;display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;pointer-events:none}
.drop-overlay.visible{display:flex}
.drop-overlay svg{width:56px;height:56px;stroke:var(--accent);fill:none;stroke-width:1.5}
.drop-overlay p{font-size:18px;font-weight:700;color:var(--accent)}
.drop-overlay small{font-size:13px;color:var(--accent);opacity:.8}

/* ── Doc list ── */
.doc-list{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:5px}
.drop-zone{border:2px dashed var(--border2);border-radius:12px;padding:22px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:7px;color:var(--text3);cursor:pointer;transition:all .15s;flex-shrink:0}
.drop-zone:hover{border-color:var(--accent);background:var(--accent-bg);color:var(--accent)}
.drop-zone svg{width:26px;height:26px;stroke:currentColor;fill:none}
.drop-zone p{font-size:13px;font-weight:500}
.drop-zone small{font-size:11px;opacity:.75}

.doc-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:11px 13px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:border-color .12s,box-shadow .12s,transform .08s;animation:fadeIn .18s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.doc-card:hover{border-color:var(--border2);box-shadow:var(--shadow);transform:translateY(-1px)}
.doc-card.ai-new{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
.file-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px}
.doc-info{flex:1;min-width:0}
.doc-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-meta{display:flex;align-items:center;gap:5px;margin-top:3px;flex-wrap:wrap}
.doc-badge{font-size:10px;padding:1px 7px;border-radius:20px;font-weight:500;flex-shrink:0}
.doc-date{font-size:11px;color:var(--text3)}
.doc-size{font-size:11px;color:var(--text3)}
.ai-badge{font-size:10px;padding:1px 6px;border-radius:20px;background:var(--accent-bg);color:var(--accent);font-weight:700}
.doc-amount{font-size:13px;font-weight:500;flex-shrink:0;margin-left:auto}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;gap:12px;color:var(--text3)}
.empty-state svg{width:38px;height:38px;opacity:.35}
.empty-state p{font-size:13px}

/* ── Modals ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeOv .14s ease}
@keyframes fadeOv{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:14px;border:1px solid var(--border);width:100%;max-width:460px;padding:20px;display:flex;flex-direction:column;gap:14px;animation:slideUp .18s ease;max-height:88vh;overflow-y:auto}
.modal-lg{max-width:540px}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-hdr h2{font-size:14px;font-weight:700;display:flex;align-items:center;gap:7px}
.modal-x{background:var(--surface2);border:none;border-radius:6px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.modal-x:hover{background:var(--border)}
.modal-x svg{width:14px;height:14px;fill:currentColor}
.form-field{display:flex;flex-direction:column;gap:4px}
.form-lbl{font-size:12px;font-weight:500;color:var(--text2)}
.form-inp{padding:8px 11px;border:1px solid var(--border);border-radius:7px;background:var(--surface2);color:var(--text);font-size:13px;outline:none;transition:border-color .13s}
.form-inp:focus{border-color:var(--accent)}
.form-inp::placeholder{color:var(--text3)}
.form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cat-picker{display:flex;flex-wrap:wrap;gap:5px}
.cp-btn{padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-weight:500;transition:all .1s}
.cp-btn.sel{border-color:transparent;font-weight:700}
.ai-box{background:var(--accent-bg);border:1px solid var(--accent);border-radius:9px;padding:12px;display:flex;flex-direction:column;gap:7px}
.ai-row{display:flex;align-items:baseline;gap:7px;font-size:12px}
.ai-key{color:var(--accent);font-weight:500;width:60px;flex-shrink:0}
.ai-val{font-weight:500}
.modal-footer{display:flex;gap:7px;justify-content:flex-end;flex-shrink:0}
.btn-cancel{background:transparent;border:1px solid var(--border);border-radius:7px;padding:7px 16px;font-size:13px;color:var(--text2)}
.btn-cancel:hover{background:var(--surface2)}
.btn-save{background:var(--accent);color:#fff;border:none;border-radius:7px;padding:7px 18px;font-size:13px;font-weight:500}
.btn-save:hover{opacity:.88}

/* ── Category Settings ── */
.cat-set-list{display:flex;flex-direction:column;gap:5px;max-height:300px;overflow-y:auto}
.cat-set-row{display:flex;align-items:center;gap:7px;padding:7px 9px;background:var(--surface2);border-radius:7px;border:1px solid var(--border)}
.cs-color{width:20px;height:20px;border-radius:50%;border:2px solid var(--border2);cursor:pointer;padding:0;flex-shrink:0}
.cs-inp{flex:1;padding:4px 7px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-size:13px;outline:none}
.cs-inp:focus{border-color:var(--accent)}
.cs-del{background:transparent;border:none;color:var(--text3);display:flex;padding:3px;border-radius:5px}
.cs-del:hover{color:var(--danger);background:var(--danger-bg)}
.cs-del svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2}
.btn-add-cat{display:flex;align-items:center;gap:5px;background:transparent;border:1.5px dashed var(--border2);border-radius:7px;padding:7px 12px;font-size:12px;color:var(--text3);width:100%;justify-content:center;transition:all .1s}
.btn-add-cat:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}

/* ── Detail Panel ── */
.detail{position:fixed;top:0;right:0;bottom:0;width:290px;background:var(--surface);border-left:1px solid var(--border);z-index:200;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .2s cubic-bezier(.4,0,.2,1);box-shadow:-4px 0 18px rgba(0,0,0,.09)}
.detail.open{transform:translateX(0)}
.detail-hdr{padding:14px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center}
.d-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px}
.d-info{flex:1;min-width:0}
.d-title{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.d-sub{font-size:11px;color:var(--text3);margin-top:2px}
.d-close{background:transparent;border:none;color:var(--text3);display:flex;padding:3px;border-radius:5px}
.d-close:hover{background:var(--surface2)}
.d-close svg{width:17px;height:17px;fill:currentColor}
.detail-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:14px}
.d-sec-lbl{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:6px}
.d-row{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;padding:3px 0;border-bottom:1px solid var(--border)}
.d-row:last-child{border-bottom:none}
.d-key{color:var(--text2)}
.d-val{font-weight:500;text-align:right;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.d-memo{background:var(--surface2);border-radius:7px;padding:9px 11px;font-size:12px;color:var(--text2);line-height:1.7}
.detail-footer{padding:12px 14px;border-top:1px solid var(--border);display:flex;gap:7px}
.btn-open{flex:1;background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:7px;padding:7px;font-size:12px;display:flex;align-items:center;justify-content:center;gap:5px}
.btn-open:hover{background:var(--surface2)}
.btn-open svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8}
.btn-del{flex:1;background:transparent;border:1px solid var(--danger);color:var(--danger);border-radius:7px;padding:7px;font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:5px}
.btn-del:hover{background:var(--danger-bg)}
.btn-del svg{width:13px;height:13px;fill:currentColor}

/* ── Progress Modal ── */
.progress-modal{background:var(--surface);border-radius:14px;border:1px solid var(--border);width:100%;max-width:380px;padding:22px;display:flex;flex-direction:column;gap:14px;animation:slideUp .18s ease}
.progress-bar-wrap{background:var(--surface2);border-radius:20px;height:6px;overflow:hidden}
.progress-bar{height:100%;background:var(--accent);border-radius:20px;transition:width .3s}
.progress-files{font-size:12px;color:var(--text3);display:flex;flex-direction:column;gap:4px;max-height:120px;overflow-y:auto}
.pf-row{display:flex;align-items:center;gap:7px;font-size:12px}
.pf-row svg{width:14px;height:14px;flex-shrink:0}

/* ── Toast ── */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:11px;box-shadow:var(--shadow);padding:11px 16px;display:flex;align-items:center;gap:10px;font-size:13px;z-index:600;min-width:220px;transition:opacity .25s,transform .25s}
.toast.hidden{opacity:0;pointer-events:none;transform:translateX(-50%) translateY(8px)}
.spin{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.toast-ok{width:18px;height:18px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.toast-ok svg{width:10px;height:10px;fill:white}

/* ── Banners ── */
.banner{display:none;align-items:center;gap:10px;padding:8px 18px;font-size:12px;border-bottom:1px solid var(--border);flex-shrink:0}
.banner.visible{display:flex}
#apikey-banner{background:var(--warn-bg);border-color:var(--warn-border);color:var(--warn-text)}
#apikey-banner input{flex:1;max-width:300px;padding:4px 9px;border:1px solid var(--warn-border);border-radius:6px;font-size:12px;background:var(--surface);color:var(--text);outline:none}
#apikey-banner .save-btn{background:#854f0b;color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:12px;font-weight:500}
#install-banner{background:var(--accent-bg);color:var(--accent)}
.btn-install{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:12px;font-weight:500;margin-left:auto}
.banner-x{background:transparent;border:none;color:inherit;font-size:17px;opacity:.6;padding:1px 5px;margin-left:4px}

/* ── Bug Panel ── */
.bug-panel{position:fixed;bottom:18px;right:18px;width:340px;background:var(--surface);border:1px solid var(--danger);border-radius:13px;box-shadow:0 4px 22px rgba(0,0,0,.14);z-index:500;display:flex;flex-direction:column;transform:translateY(110%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.bug-panel.open{transform:translateY(0)}
.bug-hdr{display:flex;align-items:center;gap:8px;padding:10px 13px;border-bottom:1px solid var(--border);background:var(--danger-bg);border-radius:13px 13px 0 0}
.bug-hdr svg{width:16px;height:16px;stroke:var(--danger);fill:none;stroke-width:2;flex-shrink:0}
.bug-title{font-size:12px;font-weight:700;color:var(--danger);flex:1}
.bug-x{background:transparent;border:none;color:var(--text3);font-size:16px;padding:1px 4px}
.bug-body{padding:11px 13px;display:flex;flex-direction:column;gap:8px;max-height:230px;overflow-y:auto}
.bug-err{background:var(--surface2);border-radius:7px;padding:7px 9px;font-size:11px;color:var(--text2);font-family:monospace;word-break:break-all;max-height:70px;overflow-y:auto;line-height:1.5}
.bug-ai{background:var(--accent-bg);border:1px solid var(--accent);border-radius:7px;padding:9px 11px;font-size:12px;line-height:1.7}
.bug-footer{display:flex;gap:7px;padding:9px 13px;border-top:1px solid var(--border)}
.btn-copy{flex:1;background:var(--accent);color:#fff;border:none;border-radius:7px;padding:7px;font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:5px}
.btn-copy svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}
.btn-ignore{background:transparent;border:1px solid var(--border);border-radius:7px;padding:7px 12px;font-size:12px;color:var(--text2)}
.bspin{width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
</style>
</head>
<body>

<!-- Full-screen drop overlay -->
<div class="drop-overlay" id="drop-overlay">
  <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
  <p>ここにドロップして保管</p>
  <small>PDF・Word・Excel・画像・動画・ZIP など全形式対応</small>
</div>

<!-- API Key Banner -->
<div class="banner" id="apikey-banner">
  <span>⚠️ AI自動分類にはAPIキーが必要：</span>
  <input type="password" id="apikey-input" placeholder="sk-ant-...">
  <button class="save-btn" onclick="saveApiKey()">保存</button>
  <button class="banner-x" onclick="this.closest('.banner').classList.remove('visible')">×</button>
</div>

<!-- Install Banner -->
<div class="banner" id="install-banner">
  <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:var(--accent);flex-shrink:0"><path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z"/></svg>
  <span>このアプリをPCにインストールできます</span>
  <button class="btn-install" id="btn-install">インストール</button>
  <button class="banner-x" onclick="this.closest('.banner').classList.remove('visible')">×</button>
</div>

<div class="topbar">
  <div class="logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm4 18H6V4h7v5h5v11z"/></svg></div>
    <span class="logo-name">書類管理</span>
  </div>
  <div class="search-wrap">
    <svg class="si" viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
    <input type="text" id="search-input" placeholder="ファイル名・発行元・メモを検索…" oninput="render()">
  </div>
  <div class="topbar-btns">
    <button class="btn-icon" onclick="openCatSettings()">

<script>
// ── PDF.js ──
if(typeof pdfjsLib!=='undefined')
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── API Key ──
const getKey=()=>localStorage.getItem('docman_apikey')||'';
function saveApiKey(){
  const k=document.getElementById('apikey-input').value.trim();
  if(!k)return;
  localStorage.setItem('docman_apikey',k);
  document.getElementById('apikey-banner').classList.remove('visible');

// ── IndexedDB ──
let db=null;
function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open('docman',2);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('docs'))d.createObjectStore('docs',{keyPath:'id'});
      if(!d.objectStoreNames.contains('files'))d.createObjectStore('files',{keyPath:'id'});
    };
    req.onsuccess=e=>{db=e.target.result;res(db)};
    req.onerror=()=>rej(req.error);
  });
}
function dbPut(store,val){return new Promise((res,rej)=>{const tx=db.transaction(store,'readwrite');tx.objectStore(store).put(val).onsuccess=()=>res();tx.onerror=()=>rej(tx.error)})}
function dbGet(store,key){return new Promise((res,rej)=>{const tx=db.transaction(store,'readonly');const req=tx.objectStore(store).get(key);req.onsuccess=()=>res(req.result);req.onerror=()=>rej(req.error)})}
function dbDel(store,key){return new Promise((res,rej)=>{const tx=db.transaction(store,'readwrite');tx.objectStore(store).delete(key).onsuccess=()=>res();tx.onerror=()=>rej(tx.error)})}
function dbGetAll(store){return new Promise((res,rej)=>{const tx=db.transaction(store,'readonly');const req=tx.objectStore(store).getAll();req.onsuccess=()=>res(req.result);req.onerror=()=>rej(req.error)})}
async function getStorageSize(){
  if(navigator.storage&&navigator.storage.estimate){
    const{usage,quota}=await navigator.storage.estimate();
    return{usage,quota};
  }
  return{usage:0,quota:0};
}
function fmtBytes(b){
  if(!b)return'0B';
  if(b<1024)return b+'B';
  if(b<1048576)return(b/1024).toFixed(1)+'KB';
  if(b<1073741824)return(b/1048576).toFixed(1)+'MB';
  return(b/1073741824).toFixed(2)+'GB';
}

// ── Categories ──
const DEFAULT_CATS=[
  {id:'receipt',label:'領収書',color:'#2d5a3d',bg:'#e8f0ea'},
  {id:'manual',label:'取扱説明書',color:'#185fa5',bg:'#e6f1fb'},
  {id:'notice',label:'お知らせ',color:'#854f0b',bg:'#faeeda'},
  {id:'contract',label:'契約書',color:'#993556',bg:'#fbeaf0'},
  {id:'medical',label:'医療・保険',color:'#a32d2d',bg:'#fcebeb'},
  {id:'tax',label:'税務・確定申告',color:'#3b6d11',bg:'#eaf3de'},
  {id:'warranty',label:'保証書',color:'#534ab7',bg:'#eeedfe'},
  {id:'other',label:'その他',color:'#5f5e5a',bg:'#f1efe8'},
];
function loadCats(){try{const s=localStorage.getItem('docman_cats_v1');return s?JSON.parse(s):DEFAULT_CATS}catch{return DEFAULT_CATS}}
function saveCatsLS(c){try{localStorage.setItem('docman_cats_v1',JSON.stringify(c))}catch(e){}}
let CATS=loadCats(),catMap={};
function rebuildMap(){catMap={};CATS.forEach(c=>catMap[c.id]=c)}
rebuildMap();
function hexToBg(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);const f=v=>Math.round(v+(255-v)*.82).toString(16).padStart(2,'0');return`#${f(r)}${f(g)}${f(b)}`}

// ── File type icons ──
const EXT_ICON={
  pdf:'📄',doc:'📝',docx:'📝',xls:'📊',xlsx:'📊',ppt:'📋',pptx:'📋',
  jpg:'🖼️',jpeg:'🖼️',png:'🖼️',gif:'🖼️',webp:'🖼️',svg:'🖼️',heic:'🖼️',
  mp4:'🎬',mov:'🎬',avi:'🎬',mkv:'🎬',mp3:'🎵',wav:'🎵',
  zip:'🗜️',rar:'🗜️','7z':'🗜️',tar:'🗜️',gz:'🗜️',
  txt:'📃',csv:'📊',json:'⚙️',html:'🌐',
};
function fileIcon(name){const ext=(name||'').split('.').pop().toLowerCase();return EXT_ICON[ext]||'📁'}
function fileExt(name){return(name||'').split('.').pop().toUpperCase()||'FILE'}

// ── State ──
let docs=[],nextId=1,activeCat='all',sortBy='date',selectedId=null,editCat='receipt',pendingFile=null;

function today(){return new Date().toISOString().slice(0,10)}
function fmtDate(s){if(!s)return'—';const[y,m,d]=s.split('-');return`${y}年${parseInt(m)}月${parseInt(d)}日`}
function fmtAmt(a){return(a||a===0)?`¥${Number(a).toLocaleString()}`:'—'}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

async function loadDocs(){docs=await dbGetAll('docs');nextId=docs.length?Math.max(...docs.map(d=>d.id))+1:1}
async function saveDoc_DB(doc){await dbPut('docs',doc)}
async function deleteDoc_DB(id){await dbDel('docs',id);await dbDel('files',id)}

// ── PDF Text Extraction ──
async function extractPdfText(ab){
  if(typeof pdfjsLib==='undefined')return'';
  try{
    const pdf=await pdfjsLib.getDocument({data:ab}).promise;
    let t='';
    for(let i=1;i<=Math.min(pdf.numPages,5);i++){
      const pg=await pdf.getPage(i);
      const tc=await pg.getTextContent();
      t+=tc.items.map(x=>x.str).join(' ')+'\n';
    }
    return t.slice(0,5000);
  }catch{return''}
}

// ── AI ──
async function callAI(messages,system='',max=800){
  const k=getKey();if(!k)throw new Error('NO_KEY');
  const body={model:'claude-sonnet-4-20250514',max_tokens:max,messages};
  if(system)body.system=system;
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify(body)
  });
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(res.status===401?'INVALID_KEY':e.error?.message||'API error')}
  const d=await res.json();
  return d.content?.map(b=>b.text||'').join('')||'';
}

async function classifyFile(text,fileName,mimeType){
  const catList=CATS.map(c=>`"${c.id}"（${c.label}）`).join(', ');
  const raw=await callAI([{role:'user',content:`ファイル名: ${fileName}\nMIMEタイプ: ${mimeType}\n内容（先頭）:\n${text||'（テキスト抽出不可）'}\n\n以下のJSONのみ返してください:\n{"title":"書類名（30文字以内）","cat":"${catList}のいずれかのID","date":"YYYY-MM-DD","amount":金額またはnull,"issuer":"発行元または空","memo":"補足または空"}`}],'JSONのみ返答。',500);
  const r=JSON.parse(raw.replace(/```json|```/g,'').trim());
  if(!catMap[r.cat])r.cat=CATS[0]?.id||'other';
  return r;
}

// ── Toast ──
function showToast(msg,loading=true){
  document.getElementById('toast-msg').textContent=msg;
  document.getElementById('toast-spin').style.display=loading?'block':'none';
  document.getElementById('toast-ok').style.display=loading?'none':'flex';
  document.getElementById('toast').classList.remove('hidden');
}
function hideToast(){document.getElementById('toast').classList.add('hidden')}
function toastDone(msg){showToast(msg,false);setTimeout(hideToast,2500)}

// ── Drag & Drop (full window) ──
let dragCounter=0;
document.addEventListener('dragenter',e=>{
  if(e.dataTransfer.types.includes('Files')){dragCounter++;document.getElementById('drop-overlay').classList.add('visible')}
});
document.addEventListener('dragleave',e=>{
  dragCounter--;if(dragCounter<=0){dragCounter=0;document.getElementById('drop-overlay').classList.remove('visible')}
});
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{
  e.preventDefault();dragCounter=0;document.getElementById('drop-overlay').classList.remove('visible');
  const items=[...e.dataTransfer.items];
  handleDropItems(items);
});

// Collect all files from dropped items (including folders)
async function handleDropItems(items){
  const files=[];
  const entries=items.map(i=>i.webkitGetAsEntry?.()??null).filter(Boolean);
  if(entries.length>0){
    for(const entry of entries) await collectFromEntry(entry,files);
  }else{
    items.forEach(i=>{const f=i.getAsFile();if(f)files.push(f)});
  }
  if(files.length)processFiles(files);
}

async function collectFromEntry(entry,files){
  if(entry.isFile){
    const f=await new Promise(res=>entry.file(res));
    files.push(f);
  }else if(entry.isDirectory){
    const reader=entry.createReader();
    const entries=await new Promise(res=>reader.readEntries(res));
    for(const e of entries) await collectFromEntry(e,files);
  }
}

// ── Process multiple files ──
async function processFiles(files){
  const total=files.length;
  let done=0;
  document.getElementById('progress-overlay').style.display='flex';
  document.getElementById('progress-ttl').textContent=`${total}件のファイルを処理中…`;
  document.getElementById('progress-files').innerHTML='';
  document.getElementById('progress-bar').style.width='0%';
  document.getElementById('progress-label').textContent=`0 / ${total} 件`;

  const hasAI=!!getKey();

  for(const file of files){
    const row=document.createElement('div');
    row.className='pf-row';
    row.innerHTML=`<div class="spin" style="width:12px;height:12px;border-width:1.5px"></div><span>${esc(file.name)}</span>`;
    document.getElementById('progress-files').appendChild(row);

    await processSingleFile(file,hasAI);
    done++;
    row.innerHTML=`<svg viewBox="0 0 24 24" style="stroke:var(--accent);fill:none;stroke-width:2.5"><path d="M20 6L9 17l-5-5"/></svg><span>${esc(file.name)}</span>`;
    document.getElementById('progress-bar').style.width=`${Math.round(done/total*100)}%`;
    document.getElementById('progress-label').textContent=`${done} / ${total} 件`;
  }

  document.getElementById('progress-overlay').style.display='none';
  await loadDocs();render();
  toastDone(`${total}件を保管しました`);
  updateStorageInfo();
}

async function processSingleFile(file,useAI){
  const ab=await file.arrayBuffer();
  let text='',result=null;

  if(useAI){
    // Extract text for PDFs
    if(file.type==='application/pdf') text=await extractPdfText(ab.slice(0));
    try{result=await classifyFile(text,file.name,file.type)}catch(e){}
  }

  const id=nextId++;
  const cat=result?.cat||(CATS[0]?.id||'other');
  const doc={
    id,
    title:result?.title||file.name.replace(/\.[^.]+$/,''),
    cat,
    date:result?.date||today(),
    amount:result?.amount||null,
    issuer:result?.issuer||'',
    memo:result?.memo||'',
    created:today(),
    aiClassified:!!result,
    hasFile:true,
    fileName:file.name,
    fileType:file.type||'application/octet-stream',
    fileSize:file.size,
  };
  await dbPut('docs',doc);
  await dbPut('files',{id,data:new Uint8Array(ab),type:file.type,name:file.name});
}

// ── Manual Add ──
function openAdd(prefill=''){
  pendingFile=null;
  document.getElementById('modal-ai-icon').style.display='none';
  document.getElementById('modal-ttl').textContent='手動で追加';
  document.getElementById('ai-sec').style.display='none';
  document.getElementById('f-title').value=prefill;
  document.getElementById('f-date').value=today();
  document.getElementById('f-amount').value='';
  document.getElementById('f-issuer').value='';
  document.getElementById('f-memo').value='';
  editCat=CATS[0]?.id||'other';
  renderCatPicker();
  document.getElementById('modal').style.display='flex';
  setTimeout(()=>document.getElementById('f-title').focus(),50);
}
function closeModal(){document.getElementById('modal').style.display='none';pendingFile=null}

function renderCatPicker(){
  document.getElementById('cat-picker').innerHTML=CATS.map(c=>`
    <button class="cp-btn ${editCat===c.id?'sel':''}"
      style="${editCat===c.id?`background:${c.bg};color:${c.color};border-color:${c.bg}`:''}"
      onclick="editCat='${c.id}';renderCatPicker()">${esc(c.label)}</button>`).join('');
}

async function saveDoc(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){document.getElementById('f-title').focus();return}
  const amt=document.getElementById('f-amount').value;
  const id=nextId++;
  const doc={id,title,cat:editCat,
    date:document.getElementById('f-date').value||today(),
    amount:amt!==''?parseInt(amt):null,
    issuer:document.getElementById('f-issuer').value.trim(),
    memo:document.getElementById('f-memo').value.trim(),
    created:today(),aiClassified:false,hasFile:false,
    fileName:'',fileType:'',fileSize:0};
  await dbPut('docs',doc);
  docs.unshift(doc);nextId++;
  closeModal();await loadDocs();render();
  updateStorageInfo();
}

// ── Category Settings ──
let tempCats=[];
function openCatSettings(){tempCats=CATS.map(c=>({...c}));renderCatSetList();document.getElementById('cat-modal').style.display='flex'}
function closeCatSettings(){document.getElementById('cat-modal').style.display='none'}
function renderCatSetList(){
  document.getElementById('cat-set-list').innerHTML=tempCats.map((c,i)=>`
    <div class="cat-set-row">
      <input type="color" class="cs-color" value="${c.color}" title="色を変更"
        onchange="tempCats[${i}].color=this.value;tempCats[${i}].bg=hexToBg(this.value)">
      <input type="text" class="cs-inp" value="${esc(c.label)}" placeholder="カテゴリ名"
        oninput="tempCats[${i}].label=this.value">
      <button class="cs-del" onclick="if(tempCats.length>1){tempCats.splice(${i},1);renderCatSetList()}else alert('カテゴリは1つ以上必要です')">
        <svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>`).join('');
}
function addNewCat(){
  const palette=['#c0392b','#e67e22','#8e44ad','#16a085','#2980b9'];
  const color=palette[tempCats.length%palette.length];
  tempCats.push({id:'cat_'+Date.now(),label:'新しいカテゴリ',color,bg:hexToBg(color)});
  renderCatSetList();
  setTimeout(()=>{const ins=document.querySelectorAll('.cs-inp');if(ins.length)ins[ins.length-1].select()},50);
}
function saveCatSettings(){
  if(tempCats.some(c=>!c.label.trim())){alert('カテゴリ名を入力してください');return}
  CATS=tempCats.map(c=>({...c,label:c.label.trim()}));
  saveCatsLS(CATS);rebuildMap();closeCatSettings();render();toastDone('カテゴリを保存しました');
}

// ── Render ──
function setSort(k){sortBy=k;document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));document.getElementById('s-'+k).classList.add('active');render()}
function setCategory(id){activeCat=id;render()}

function getFiltered(){
  const q=(document.getElementById('search-input').value||'').trim().toLowerCase();
  return docs.filter(d=>{
    const catOk=activeCat==='all'||d.cat===activeCat;
    const qOk=!q||[d.title,d.issuer,d.memo,d.fileName].some(x=>(x||'').toLowerCase().includes(q));
    return catOk&&qOk;
  }).sort((a,b)=>{
    if(sortBy==='date')return(b.date||'').localeCompare(a.date||'');
    if(sortBy==='name')return(a.title||'').localeCompare(b.title||'','ja');
    if(sortBy==='size')return(b.fileSize||0)-(a.fileSize||0);
    return 0;
  });
}

function renderSidebar(){
  const counts={all:docs.length};CATS.forEach(c=>{counts[c.id]=docs.filter(d=>d.cat===c.id).length});
  let h=`<div class="sb-head">カテゴリ</div>
  <button class="cat-btn ${activeCat==='all'?'active':''}" onclick="setCategory('all')">
    <span class="cat-dot" style="background:#888"></span><span class="cat-lbl">すべて</span><span class="cat-cnt">${counts.all}</span></button>
  <div class="sb-divider"></div>`;
  CATS.forEach(c=>{h+=`<button class="cat-btn ${activeCat===c.id?'active':''}" onclick="setCategory('${c.id}')">
    <span class="cat-dot" style="background:${c.color}"></span><span class="cat-lbl">${esc(c.label)}</span>
    <span class="cat-cnt">${counts[c.id]||0}</span></button>`});
  document.getElementById('sidebar').innerHTML=h;
}

function renderList(){
  const list=getFiltered();
  document.getElementById('doc-cnt').textContent=`${list.length}件`;
  const dl=document.getElementById('doc-list');
  const dz=document.getElementById('drop-zone');
  dl.innerHTML='';
  if(dz)dl.appendChild(dz);
  else initDropZone();
  if(!list.length){
    const e=document.createElement('div');e.className='empty-state';
    e.innerHTML=`<svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg><p>ファイルが見つかりません</p>`;
    dl.appendChild(e);return;
  }
  list.forEach(d=>{
    const c=catMap[d.cat]||CATS[0]||{color:'#888',bg:'#eee',label:'不明'};
    const card=document.createElement('div');card.className='doc-card';card.onclick=()=>openDetail(d.id);
    card.innerHTML=`
      <div class="file-icon" style="background:${c.bg}">${fileIcon(d.fileName||d.title)}</div>
      <div class="doc-info">
        <div class="doc-title">${esc(d.title)}</div>
        <div class="doc-meta">
          <span class="doc-badge" style="background:${c.bg};color:${c.color}">${esc(c.label)}</span>
          <span class="doc-date">${fmtDate(d.date)}</span>
          ${d.fileName?`<span class="doc-size">${fileExt(d.fileName)}</span>`:''}
          ${d.fileSize?`<span class="doc-size">${fmtBytes(d.fileSize)}</span>`:''}
          ${d.aiClassified?`<span class="ai-badge">AI</span>`:''}
        </div>
      </div>
      ${d.amount?`<span class="doc-amount">${fmtAmt(d.amount)}</span>`:''}`;
    dl.appendChild(card);
  });
}

function render(){renderSidebar();renderList()}

// ── Drop Zone (in list) ──
function initDropZone(){
  const dl=document.getElementById('doc-list');
  const dz=document.createElement('div');dz.id='drop-zone';dz.className='drop-zone';
  dz.innerHTML=`
    <svg viewBox="0 0 24 24" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    <p>ファイル・フォルダをここにドラッグ＆ドロップ</p>
    <small>PDF・Word・Excel・画像・動画・ZIP など全形式 ／ フォルダごと・複数同時OK ／ AIが自動分類</small>
    <input type="file" id="drop-file-input" multiple style="display:none">`;
  dl.appendChild(dz);
  dz.addEventListener('click',()=>document.getElementById('drop-file-input').click());
  document.getElementById('drop-file-input').addEventListener('change',e=>{
    const files=[...e.target.files];if(files.length)processFiles(files);e.target.value='';
  });
}

// ── Detail ──
function openDetail(id){
  const d=docs.find(x=>x.id===id);if(!d)return;
  selectedId=id;
  const c=catMap[d.cat]||CATS[0]||{color:'#888',bg:'#eee',label:'不明'};
  document.getElementById('d-icon').textContent=fileIcon(d.fileName||d.title);
  document.getElementById('d-icon').style.background=c.bg;
  document.getElementById('d-title').textContent=d.title;
  document.getElementById('d-cat').textContent=c.label;
  document.getElementById('d-date').textContent=fmtDate(d.date);
  document.getElementById('d-amount').textContent=fmtAmt(d.amount);
  document.getElementById('d-issuer').textContent=d.issuer||'—';
  document.getElementById('d-ext').textContent=d.fileName?fileExt(d.fileName):'—';
  document.getElementById('d-size').textContent=d.fileSize?fmtBytes(d.fileSize):'—';
  document.getElementById('d-created').textContent=fmtDate(d.created);
  document.getElementById('d-ai').textContent=d.aiClassified?'AI自動分類':'手動登録';
  const ms=document.getElementById('d-memo-sec');
  if(d.memo){ms.style.display='block';document.getElementById('d-memo').textContent=d.memo}else ms.style.display='none';
  // Buttons
  const canPreview=['application/pdf','image/jpeg','image/png','image/gif','image/webp','image/svg+xml','text/plain','text/html'];
  document.getElementById('btn-open-file').style.display=d.hasFile&&canPreview.includes(d.fileType)?'flex':'none';
  document.getElementById('btn-dl').style.display=d.hasFile?'flex':'none';
  document.getElementById('detail').classList.add('open');
}
function closeDetail(){document.getElementById('detail').classList.remove('open');selectedId=null}

async function openFile(){
  if(!selectedId)return;
  const rec=await dbGet('files',selectedId);if(!rec)return;
  const blob=new Blob([rec.data],{type:rec.type});
  window.open(URL.createObjectURL(blob),'_blank');
}
async function downloadFile(){
  if(!selectedId)return;
  const rec=await dbGet('files',selectedId);if(!rec)return;
  const d=docs.find(x=>x.id===selectedId);
  const blob=new Blob([rec.data],{type:rec.type});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=rec.name||d?.title||'file';a.click();
}
async function deleteDoc(){
  if(!selectedId)return;
  if(!confirm('このファイルを削除しますか？'))return;
  await deleteDoc_DB(selectedId);
  docs=docs.filter(d=>d.id!==selectedId);
  closeDetail();render();updateStorageInfo();
}

// ── Storage info ──
async function updateStorageInfo(){
  const{usage,quota}=await getStorageSize();
  if(quota>0){
    document.getElementById('storage-info').textContent=`使用中 ${fmtBytes(usage)} / ${fmtBytes(quota)}`;
  }
}

// ── Bug Detection ──
let bugFixText='',lastBugKey='';
async function reportBug(msg,stack){
  const key=msg.slice(0,60);if(key===lastBugKey)return;lastBugKey=key;
  document.getElementById('bug-err').textContent=`${msg}\n${(stack||'').slice(0,200)}`;
  document.getElementById('bug-ai').style.display='none';
  document.getElementById('bspin').style.display='inline-block';
  document.getElementById('btn-copy-fix').style.display='none';
  bugFixText='';
  document.getElementById('bug-panel').classList.add('open');
  if(!getKey()){document.getElementById('bspin').style.display='none';document.getElementById('bug-ai').textContent='APIキーを設定するとAIが修正提案します。';document.getElementById('bug-ai').style.display='block';return}
  try{
    const s=await callAI([{role:'user',content:`JavaScriptエラー: ${msg}\nスタック: ${(stack||'').slice(0,400)}\n\n原因と修正方法を日本語で簡潔に説明してください。`}],'',350);
    bugFixText=s;document.getElementById('bug-ai').textContent=s;document.getElementById('bug-ai').style.display='block';document.getElementById('btn-copy-fix').style.display='flex';
  }catch{document.getElementById('bug-ai').textContent='AI解析に失敗しました。';document.getElementById('bug-ai').style.display='block';}
  finally{document.getElementById('bspin').style.display='none'}
}
function closeBugPanel(){document.getElementById('bug-panel').classList.remove('open')}
function copyFix(){if(!bugFixText)return;navigator.clipboard.writeText(bugFixText).then(()=>toastDone('修正提案をコピーしました'))}
window.addEventListener('error',e=>{if(e.filename?.includes('pdf'))return;reportBug(e.message||'不明なエラー',e.error?.stack)});
window.addEventListener('unhandledrejection',e=>{const m=e.reason?.message||String(e.reason||'');if(m.includes('pdf')||m.includes('fetch')||m.includes('NO_KEY'))return;reportBug(m,e.reason?.stack)});

// ── PWA ──
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('install-banner').classList.add('visible')});
document.getElementById('btn-install').onclick=async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;document.getElementById('install-banner').classList.remove('visible')};
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeDetail();closeCatSettings();closeBugPanel()}});
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});

// ── Init ──
openDB().then(async()=>{
  await loadDocs();
  initDropZone();
  render();
  updateStorageInfo();
  if(!getKey())document.getElementById('apikey-banner').classList.add('visible');
}).catch(e=>console.error('DB初期化エラー:',e));
</script>
