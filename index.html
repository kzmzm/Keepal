<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#2d5a3d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="書類管理">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>書類管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f7f6f3;--surface:#fff;--surface2:#f0efe9;
  --border:#e4e2da;--border2:#ccc9be;
  --text:#1a1a18;--text2:#6b6860;--text3:#a09d94;
  --accent:#2d5a3d;--accent-bg:#e8f0ea;
  --danger:#e2534a;--danger-bg:#fff0ef;
  --warn-bg:#faeeda;--warn-border:#e4c97a;--warn-text:#633806;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-left:env(safe-area-inset-left,0px);
  --safe-right:env(safe-area-inset-right,0px);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#141412;--surface:#1e1e1b;--surface2:#252520;
  --border:#2e2e28;--border2:#3a3a32;
  --text:#f0efe9;--text2:#a09d94;--text3:#6b6860;
  --accent:#5d9e72;--accent-bg:#1a2e20;
  --danger:#f87171;--danger-bg:#2a1010;
  --warn-bg:#2a2010;--warn-border:#6b5020;--warn-text:#e4c97a;
}}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}
button{font-family:inherit;cursor:pointer;-webkit-appearance:none}
input,select{font-family:inherit;-webkit-appearance:none}

/* ── Topbar ── */
.topbar{display:flex;align-items:center;gap:10px;padding:calc(10px + var(--safe-top)) 16px 10px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{width:30px;height:30px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-icon svg{width:16px;height:16px;fill:white}
.logo-name{font-size:15px;font-weight:700}
.topbar-right{display:flex;gap:7px;margin-left:auto;align-items:center}
.icon-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:9px;background:var(--surface2);color:var(--text2)}
.icon-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8}
.icon-btn:active{opacity:.7}
.btn-add-top{display:flex;align-items:center;gap:5px;background:var(--accent);color:#fff;border:none;border-radius:9px;padding:8px 13px;font-size:13px;font-weight:500}
.btn-add-top svg{width:16px;height:16px;stroke:white;fill:none;stroke-width:2.5}
.btn-add-top:active{opacity:.8}

/* ── Search bar ── */
.search-bar{padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.search-inner{position:relative}
.search-inner svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;fill:var(--text3)}
#search-input{width:100%;padding:9px 12px 9px 34px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;font-size:14px;color:var(--text);outline:none}
#search-input:focus{border-color:var(--accent)}
#search-input::placeholder{color:var(--text3)}

/* ── Bottom nav (mobile) ── */
.bottom-nav{display:none;background:var(--surface);border-top:1px solid var(--border);padding:8px 0 calc(8px + var(--safe-bottom));flex-shrink:0}
.bottom-nav-inner{display:flex;align-items:stretch}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;border:none;background:transparent;color:var(--text3);font-size:10px;font-weight:500}
.bnav-btn.active{color:var(--accent)}
.bnav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8}
.bnav-btn:active{opacity:.6}

/* ── Layout ── */
.body{display:flex;flex:1;overflow:hidden}
.sidebar{width:180px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:10px 7px;display:flex;flex-direction:column;gap:1px}
.sb-head{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.07em;padding:5px 10px 3px;text-transform:uppercase}
.cat-btn{display:flex;align-items:center;gap:7px;width:100%;padding:8px 9px;border:none;background:transparent;border-radius:8px;text-align:left;font-size:13px;color:var(--text2);transition:background .1s}
.cat-btn:hover,.cat-btn:active{background:var(--surface2)}
.cat-btn.active{background:var(--accent-bg);color:var(--accent);font-weight:500}
.cat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cat-lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-cnt{font-size:11px;color:var(--text3);background:var(--surface2);border-radius:20px;padding:1px 6px;min-width:20px;text-align:center}
.cat-btn.active .cat-cnt{background:var(--accent-bg);color:var(--accent)}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.toolbar{display:flex;align-items:center;gap:6px;padding:8px 14px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.sort-lbl{font-size:12px;color:var(--text3)}
.sort-btn{font-size:12px;padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2)}
.sort-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.doc-cnt{margin-left:auto;font-size:12px;color:var(--text3)}
.storage-info{font-size:11px;color:var(--text3)}

/* ── Drop overlay ── */
.drop-overlay{position:fixed;inset:0;background:rgba(45,90,61,.12);border:3px solid var(--accent);z-index:1000;display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;pointer-events:none}
.drop-overlay.visible{display:flex}
.drop-overlay svg{width:56px;height:56px;stroke:var(--accent);fill:none;stroke-width:1.5}
.drop-overlay p{font-size:18px;font-weight:700;color:var(--accent)}
.drop-overlay small{font-size:13px;color:var(--accent);opacity:.8}

/* ── Doc list ── */
.doc-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 14px;display:flex;flex-direction:column;gap:6px}
.drop-zone{border:2px dashed var(--border2);border-radius:12px;padding:20px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:7px;color:var(--text3);cursor:pointer;transition:all .15s;flex-shrink:0}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--accent);background:var(--accent-bg);color:var(--accent)}
.drop-zone svg{width:26px;height:26px;stroke:currentColor;fill:none}
.drop-zone p{font-size:13px;font-weight:500}
.drop-zone small{font-size:11px;opacity:.75}

.doc-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 13px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:border-color .12s;animation:fadeIn .18s ease;-webkit-user-select:none;user-select:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.doc-card:active{background:var(--surface2)}
.file-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px}
.doc-info{flex:1;min-width:0}
.doc-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-meta{display:flex;align-items:center;gap:5px;margin-top:3px;flex-wrap:wrap}
.doc-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;flex-shrink:0}
.doc-date{font-size:11px;color:var(--text3)}
.doc-size{font-size:11px;color:var(--text3)}
.ai-badge{font-size:10px;padding:1px 6px;border-radius:20px;background:var(--accent-bg);color:var(--accent);font-weight:700}
.doc-amount{font-size:13px;font-weight:500;flex-shrink:0;margin-left:auto}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;gap:12px;color:var(--text3)}
.empty-state svg{width:40px;height:40px;opacity:.35}
.empty-state p{font-size:14px;text-align:center;line-height:1.6}

/* ── Sheet (Bottom sheet for mobile) ── */
.sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:400;opacity:0;transition:opacity .25s;pointer-events:none;display:none}
.sheet-backdrop.visible{opacity:1;pointer-events:auto;display:block}
.sheet{position:fixed;left:0;right:0;bottom:0;background:var(--surface);border-radius:20px 20px 0 0;z-index:401;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);padding-bottom:var(--safe-bottom);max-height:92vh;display:none;flex-direction:column}
.sheet.open{transform:translateY(0);display:flex}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 6px}
.sheet-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 18px 12px;flex-shrink:0}
.sheet-hdr h2{font-size:15px;font-weight:700;display:flex;align-items:center;gap:7px}
.sheet-x{background:var(--surface2);border:none;border-radius:6px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.sheet-x svg{width:14px;height:14px;fill:currentColor}
.sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 18px;display:flex;flex-direction:column;gap:13px;flex:1}
.sheet-footer{display:flex;gap:8px;padding:14px 18px calc(14px + var(--safe-bottom));border-top:1px solid var(--border);flex-shrink:0}
.btn-cancel{flex:1;background:var(--surface2);border:none;border-radius:10px;padding:12px;font-size:14px;color:var(--text2);font-weight:500}
.btn-save{flex:2;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700}
.btn-cancel:active,.btn-save:active{opacity:.8}

.form-field{display:flex;flex-direction:column;gap:5px}
.form-lbl{font-size:12px;font-weight:500;color:var(--text2)}
.form-inp{padding:11px 13px;border:1px solid var(--border);border-radius:10px;background:var(--surface2);color:var(--text);font-size:15px;outline:none;transition:border-color .13s;width:100%}
.form-inp:focus{border-color:var(--accent)}
.form-inp::placeholder{color:var(--text3)}
.form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cat-picker{display:flex;flex-wrap:wrap;gap:6px}
.cp-btn{padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;font-weight:500}
.cp-btn.sel{border-color:transparent;font-weight:700}
.cp-btn:active{opacity:.7}
.ai-result-box{background:var(--accent-bg);border:1px solid var(--accent);border-radius:10px;padding:13px;display:flex;flex-direction:column;gap:7px}
.ai-row{display:flex;align-items:baseline;gap:7px;font-size:13px}
.ai-key{color:var(--accent);font-weight:500;width:60px;flex-shrink:0}
.ai-val{font-weight:500}

/* ── Detail sheet ── */
.d-file-icon{font-size:40px;text-align:center;padding:8px 0}
.d-sec-lbl{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:6px}
.d-row{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;padding:5px 0;border-bottom:1px solid var(--border)}
.d-row:last-child{border-bottom:none}
.d-key{color:var(--text2)}
.d-val{font-weight:500;text-align:right;max-width:55%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.d-memo{background:var(--surface2);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--text2);line-height:1.7}
.detail-action-row{display:flex;gap:8px}
.btn-file-action{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px;font-size:13px;color:var(--text2);display:flex;align-items:center;justify-content:center;gap:5px}
.btn-file-action svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8}
.btn-file-action:active{opacity:.7}
.btn-del-full{background:var(--danger-bg);border:1px solid var(--danger);border-radius:10px;padding:13px;font-size:14px;font-weight:700;color:var(--danger);width:100%;display:flex;align-items:center;justify-content:center;gap:7px}
.btn-del-full svg{width:16px;height:16px;fill:currentColor}
.btn-del-full:active{opacity:.8}

/* ── Cat Settings sheet ── */
.cat-set-list{display:flex;flex-direction:column;gap:6px}
.cat-set-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface2);border-radius:9px;border:1px solid var(--border)}
.cs-color{width:24px;height:24px;border-radius:50%;border:2px solid var(--border2);cursor:pointer;padding:0;flex-shrink:0}
.cs-inp{flex:1;padding:6px 9px;border:1px solid var(--border);border-radius:7px;background:var(--surface);color:var(--text);font-size:14px;outline:none}
.cs-inp:focus{border-color:var(--accent)}
.cs-del{background:transparent;border:none;color:var(--text3);display:flex;padding:5px;border-radius:6px}
.cs-del svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
.cs-del:active{color:var(--danger)}
.btn-add-cat{display:flex;align-items:center;gap:6px;background:transparent;border:1.5px dashed var(--border2);border-radius:9px;padding:10px 14px;font-size:13px;color:var(--text3);width:100%;justify-content:center}
.btn-add-cat svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2}
.btn-add-cat:active{border-color:var(--accent);color:var(--accent)}

/* ── Progress sheet ── */
.progress-bar-wrap{background:var(--surface2);border-radius:20px;height:7px;overflow:hidden}
.progress-bar{height:100%;background:var(--accent);border-radius:20px;transition:width .3s}
.progress-files{display:flex;flex-direction:column;gap:5px;max-height:160px;overflow-y:auto}
.pf-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}
.pf-row svg{width:14px;height:14px;flex-shrink:0}

/* ── Toast ── */
.toast{position:fixed;bottom:calc(80px + var(--safe-bottom));left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);padding:12px 16px;display:flex;align-items:center;gap:10px;font-size:13px;z-index:600;white-space:nowrap;transition:opacity .25s,transform .25s}
.toast.hidden{opacity:0;pointer-events:none;transform:translateX(-50%) translateY(8px)}
.spin{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.toast-ok{width:18px;height:18px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.toast-ok svg{width:10px;height:10px;fill:white}

/* ── Banners ── */
.banner{display:none;align-items:center;gap:8px;padding:8px 14px;font-size:12px;border-bottom:1px solid var(--border);flex-shrink:0}
.banner.visible{display:flex}
#apikey-banner{background:var(--warn-bg);border-color:var(--warn-border);color:var(--warn-text);flex-wrap:wrap;gap:6px}
#apikey-banner input{flex:1;min-width:160px;padding:5px 9px;border:1px solid var(--warn-border);border-radius:7px;font-size:13px;background:var(--surface);color:var(--text);outline:none}
#apikey-banner .save-btn{background:#854f0b;color:#fff;border:none;border-radius:7px;padding:5px 12px;font-size:12px;font-weight:500}
#install-banner{background:var(--accent-bg);color:var(--accent)}
.btn-install{background:var(--accent);color:#fff;border:none;border-radius:7px;padding:5px 12px;font-size:12px;font-weight:500;margin-left:auto}
.banner-x{background:transparent;border:none;color:inherit;font-size:18px;opacity:.6;padding:1px 5px;line-height:1}

/* ── PC overrides (sidebar visible, no bottom nav) ── */
@media(min-width:640px){
  .sidebar{display:flex}
  .bottom-nav{display:none!important}
  .toast{bottom:24px}
  .sheet{border-radius:14px;left:50%;right:auto;bottom:auto;top:50%;transform:translate(-50%,-50%) translateY(30px);width:100%;max-width:480px;max-height:90vh;display:none}
  .sheet.open{transform:translate(-50%,-50%);display:flex}
  .sheet-backdrop.visible{display:flex;align-items:center;justify-content:center}
  .sheet-footer{padding-bottom:14px}
  .doc-list{padding:14px 18px}
}
@media(max-width:639px){
  .sidebar{display:none}
  .bottom-nav{display:block}
  /* Mobile sheet = true bottom sheet */
}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
</style>
</head>
<body>

<div class="drop-overlay" id="drop-overlay">
  <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
  <p>ここにドロップ</p>
  <small>全形式対応・フォルダOK</small>
</div>

<div class="banner" id="apikey-banner">
  <span>⚠️ AI分類にはAPIキーが必要：</span>
  <input type="password" id="apikey-input" placeholder="sk-ant-...">
  <button class="save-btn" onclick="saveApiKey()">保存</button>
  <button class="banner-x" onclick="this.closest('.banner').classList.remove('visible')">×</button>
</div>
<div class="banner" id="install-banner">
  <span>このアプリをインストールできます</span>
  <button class="btn-install" id="btn-install">インストール</button>
  <button class="banner-x" onclick="this.closest('.banner').classList.remove('visible')">×</button>
</div>

<div class="topbar">
  <div class="logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm4 18H6V4h7v5h5v11z"/></svg></div>
    <span class="logo-name">書類管理</span>
  </div>
  <div class="topbar-right">
    <button class="icon-btn" onclick="openCatSettings()" title="カテゴリ設定">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
    <button class="btn-add-top" onclick="openAdd()">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      追加
    </button>
  </div>
</div>

<div class="search-bar">
  <div class="search-inner">
    <svg viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
    <input type="search" id="search-input" placeholder="ファイル名・発行元・メモを検索…" oninput="render()">
  </div>
</div>

<div class="body">
  <div class="sidebar" id="sidebar"></div>
  <div class="main">
    <div class="toolbar">
      <span class="sort-lbl">並び順：</span>
      <button class="sort-btn active" id="s-date" onclick="setSort('date')">日付</button>
      <button class="sort-btn" id="s-name" onclick="setSort('name')">名前</button>
      <button class="sort-btn" id="s-size" onclick="setSort('size')">サイズ</button>
      <span class="doc-cnt" id="doc-cnt"></span>
    </div>
    <div class="doc-list" id="doc-list"></div>
  </div>
</div>

<!-- Bottom Nav (mobile only) -->

<script>
if(typeof pdfjsLib!=='undefined')
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── API Key ──
const getKey=()=>localStorage.getItem('docman_apikey')||'';
function saveApiKey(){
  const k=document.getElementById('apikey-input').value.trim();
  if(!k)return;
  localStorage.setItem('docman_apikey',k);
  document.getElementById('apikey-banner').classList.remove('visible');
  toastDone('APIキーを保存しました');
}

// ── IndexedDB ──
let db=null;
function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open('docman',2);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('docs'))d.createObjectStore('docs',{keyPath:'id'});
      if(!d.objectStoreNames.contains('files'))d.createObjectStore('files',{keyPath:'id'});
    };
    req.onsuccess=e=>{db=e.target.result;res(db)};
    req.onerror=()=>rej(req.error);
  });
}
const dbOp=(store,mode,fn)=>new Promise((res,rej)=>{const tx=db.transaction(store,mode);const s=tx.objectStore(store);const r=fn(s);if(r)r.onsuccess=()=>res(r.result);else tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error)});
const dbPut=(store,v)=>dbOp(store,'readwrite',s=>s.put(v));
const dbGet=(store,k)=>dbOp(store,'readonly',s=>s.get(k));
const dbDel=(store,k)=>dbOp(store,'readwrite',s=>s.delete(k));
const dbGetAll=store=>dbOp(store,'readonly',s=>s.getAll());

function fmtBytes(b){if(!b)return'0B';if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';if(b<1073741824)return(b/1048576).toFixed(1)+'MB';return(b/1073741824).toFixed(2)+'GB'}

// ── Categories ──
const DEFAULT_CATS=[
  {id:'receipt',label:'領収書',color:'#2d5a3d',bg:'#e8f0ea'},
  {id:'manual',label:'取扱説明書',color:'#185fa5',bg:'#e6f1fb'},
  {id:'notice',label:'お知らせ',color:'#854f0b',bg:'#faeeda'},
  {id:'contract',label:'契約書',color:'#993556',bg:'#fbeaf0'},
  {id:'medical',label:'医療・保険',color:'#a32d2d',bg:'#fcebeb'},
  {id:'tax',label:'税務・確定申告',color:'#3b6d11',bg:'#eaf3de'},
  {id:'warranty',label:'保証書',color:'#534ab7',bg:'#eeedfe'},
  {id:'other',label:'その他',color:'#5f5e5a',bg:'#f1efe8'},
];
function loadCats(){try{const s=localStorage.getItem('docman_cats_v1');return s?JSON.parse(s):DEFAULT_CATS}catch{return DEFAULT_CATS}}
function saveCatsLS(c){try{localStorage.setItem('docman_cats_v1',JSON.stringify(c))}catch(e){}}
let CATS=loadCats(),catMap={};
function rebuildMap(){catMap={};CATS.forEach(c=>catMap[c.id]=c)}
rebuildMap();
function hexToBg(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);const f=v=>Math.round(v+(255-v)*.82).toString(16).padStart(2,'0');return`#${f(r)}${f(g)}${f(b)}`}

// ── File icons ──
const EXT_ICON={pdf:'📄',doc:'📝',docx:'📝',xls:'📊',xlsx:'📊',ppt:'📋',pptx:'📋',jpg:'🖼️',jpeg:'🖼️',png:'🖼️',gif:'🖼️',webp:'🖼️',heic:'🖼️',svg:'🖼️',mp4:'🎬',mov:'🎬',avi:'🎬',mkv:'🎬',mp3:'🎵',wav:'🎵',zip:'🗜️',rar:'🗜️','7z':'🗜️',tar:'🗜️',gz:'🗜️',txt:'📃',csv:'📊',json:'⚙️',html:'🌐'};
const fileIcon=n=>(EXT_ICON[(n||'').split('.').pop().toLowerCase()]||'📁');
const fileExt=n=>(n||'').split('.').pop().toUpperCase()||'FILE';

// ── State ──
let docs=[],nextId=1,activeCat='all',sortBy='date',selectedId=null,editCat='receipt';

const today=()=>new Date().toISOString().slice(0,10);
const fmtDate=s=>{if(!s)return'—';const[y,m,d]=s.split('-');return`${y}年${parseInt(m)}月${parseInt(d)}日`};
const fmtAmt=a=>(a||a===0)?`¥${Number(a).toLocaleString()}`:'—';
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

async function loadDocs(){docs=await dbGetAll('docs');nextId=docs.length?Math.max(...docs.map(d=>d.id))+1:1}

// ── Sheet system ──
let activeSheets=[];
function openSheet(id){
  const el=document.getElementById(id);
  el.style.display='flex';
  requestAnimationFrame(()=>el.classList.add('open'));
  document.getElementById('sheet-backdrop').style.display='block';
  requestAnimationFrame(()=>document.getElementById('sheet-backdrop').classList.add('visible'));
  if(!activeSheets.includes(id))activeSheets.push(id);
}
function closeSheet(id){
  const el=document.getElementById(id);
  el.classList.remove('open');
  activeSheets=activeSheets.filter(s=>s!==id);
  if(!activeSheets.length){
    document.getElementById('sheet-backdrop').classList.remove('visible');
    setTimeout(()=>{
      if(!activeSheets.length)document.getElementById('sheet-backdrop').style.display='none';
    },260);
  }
  setTimeout(()=>{if(!el.classList.contains('open'))el.style.display='none'},280);
}
function closeAllSheets(){
  document.querySelectorAll('.sheet').forEach(s=>{s.classList.remove('open');s.style.display='none'});
  const bd=document.getElementById('sheet-backdrop');
  bd.classList.remove('visible');bd.style.display='none';
  activeSheets=[];
}

// ── Toast ──
function showToast(msg,loading=true){
  document.getElementById('toast-msg').textContent=msg;
  document.getElementById('toast-spin').style.display=loading?'block':'none';
  document.getElementById('toast-ok').style.display=loading?'none':'flex';
  document.getElementById('toast').classList.remove('hidden');
}
function hideToast(){document.getElementById('toast').classList.add('hidden')}
function toastDone(msg){showToast(msg,false);setTimeout(hideToast,2500)}

// ── PDF Text ──
async function extractPdfText(ab){
  if(typeof pdfjsLib==='undefined')return'';
  try{
    const pdf=await pdfjsLib.getDocument({data:ab}).promise;
    let t='';
    for(let i=1;i<=Math.min(pdf.numPages,5);i++){const pg=await pdf.getPage(i);const tc=await pg.getTextContent();t+=tc.items.map(x=>x.str).join(' ')+'\n'}
    return t.slice(0,5000);
  }catch{return''}
}

// ── AI ──
async function callAI(messages,system='',max=600){
  const k=getKey();if(!k)throw new Error('NO_KEY');
  const body={model:'claude-sonnet-4-20250514',max_tokens:max,messages};
  if(system)body.system=system;
  const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify(body)});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(res.status===401?'INVALID_KEY':e.error?.message||'API error')}
  const d=await res.json();
  return d.content?.map(b=>b.text||'').join('')||'';
}
async function classifyFile(text,fileName,mimeType){
  const catList=CATS.map(c=>`"${c.id}"（${c.label}）`).join(', ');
  const raw=await callAI([{role:'user',content:`ファイル名: ${fileName}\nMIME: ${mimeType}\n内容:\n${text||'（抽出不可）'}\n\nJSONのみ: {"title":"書類名30字以内","cat":"${catList}のID","date":"YYYY-MM-DD","amount":数値orNull,"issuer":"発行元or空","memo":"補足or空"}`}],'JSONのみ返答。');
  const r=JSON.parse(raw.replace(/```json|```/g,'').trim());
  if(!catMap[r.cat])r.cat=CATS[0]?.id||'other';
  return r;
}

// ── Drag & Drop (window-level) ──
let dragCnt=0;
document.addEventListener('dragenter',e=>{if(e.dataTransfer.types.includes('Files')){dragCnt++;document.getElementById('drop-overlay').classList.add('visible')}});
document.addEventListener('dragleave',e=>{dragCnt--;if(dragCnt<=0){dragCnt=0;document.getElementById('drop-overlay').classList.remove('visible')}});
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{
  e.preventDefault();dragCnt=0;document.getElementById('drop-overlay').classList.remove('visible');
  const items=[...e.dataTransfer.items];
  handleDropItems(items);
});

async function handleDropItems(items){
  const files=[];
  const entries=items.map(i=>i.webkitGetAsEntry?.()??null).filter(Boolean);
  if(entries.length){for(const en of entries)await collectFromEntry(en,files)}
  else items.forEach(i=>{const f=i.getAsFile();if(f)files.push(f)});
  if(files.length)processFiles(files);
}
async function collectFromEntry(entry,files){
  if(entry.isFile){const f=await new Promise(res=>entry.file(res));files.push(f)}
  else if(entry.isDirectory){const r=entry.createReader();const es=await new Promise(res=>r.readEntries(res));for(const e of es)await collectFromEntry(e,files)}
}

function triggerFileInput(){document.getElementById('mobile-file-input').click()}
document.getElementById('mobile-file-input').addEventListener('change',e=>{const f=[...e.target.files];if(f.length)processFiles(f);e.target.value=''});

// ── Process files ──
async function processFiles(files){
  const total=files.length;let done=0;
  document.getElementById('prog-ttl').textContent=`${total}件を処理中…`;
  document.getElementById('prog-files').innerHTML='';
  document.getElementById('progress-bar').style.width='0%';
  document.getElementById('prog-lbl').textContent=`0 / ${total} 件`;
  openSheet('progress-sheet');
  const hasAI=!!getKey();
  for(const file of files){
    const row=document.createElement('div');row.className='pf-row';
    row.innerHTML=`<div class="spin" style="width:12px;height:12px;border-width:1.5px;flex-shrink:0"></div><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(file.name)}</span>`;
    document.getElementById('prog-files').appendChild(row);
    await processSingleFile(file,hasAI);
    done++;
    row.innerHTML=`<svg viewBox="0 0 24 24" style="stroke:var(--accent);fill:none;stroke-width:2.5;flex-shrink:0"><path d="M20 6L9 17l-5-5"/></svg><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(file.name)}</span>`;
    document.getElementById('progress-bar').style.width=`${Math.round(done/total*100)}%`;
    document.getElementById('prog-lbl').textContent=`${done} / ${total} 件`;
  }
  closeSheet('progress-sheet');
  await loadDocs();render();
  toastDone(`${total}件を保管しました`);
}

async function processSingleFile(file,useAI){
  const ab=await file.arrayBuffer();
  let text='',result=null;
  if(useAI){
    if(file.type==='application/pdf')text=await extractPdfText(ab.slice(0));
    try{result=await classifyFile(text,file.name,file.type)}catch(e){}
  }
  const id=nextId++;
  const doc={id,
    title:result?.title||file.name.replace(/\.[^.]+$/,''),
    cat:result?.cat||(CATS[0]?.id||'other'),
    date:result?.date||today(),amount:result?.amount||null,
    issuer:result?.issuer||'',memo:result?.memo||'',
    created:today(),aiClassified:!!result,hasFile:true,
    fileName:file.name,fileType:file.type||'application/octet-stream',fileSize:file.size};
  await dbPut('docs',doc);
  await dbPut('files',{id,data:new Uint8Array(ab),type:file.type,name:file.name});
}

// ── Add Sheet ──
function openAdd(prefill=''){
  document.getElementById('modal-ai-icon').style.display='none';
  document.getElementById('sheet-ttl').textContent='手動で追加';
  document.getElementById('ai-sec').style.display='none';
  document.getElementById('f-title').value=prefill;
  document.getElementById('f-date').value=today();
  document.getElementById('f-amount').value='';
  document.getElementById('f-issuer').value='';
  document.getElementById('f-memo').value='';
  editCat=CATS[0]?.id||'other';
  renderCatPicker();
  openSheet('add-sheet');
  setTimeout(()=>document.getElementById('f-title').focus(),300);
}

function renderCatPicker(){
  document.getElementById('cat-picker').innerHTML=CATS.map(c=>`
    <button class="cp-btn ${editCat===c.id?'sel':''}"
      style="${editCat===c.id?`background:${c.bg};color:${c.color};border-color:${c.bg}`:''}"
      onclick="editCat='${c.id}';renderCatPicker()">${esc(c.label)}</button>`).join('');
}

async function saveDoc(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){document.getElementById('f-title').focus();return}
  const amt=document.getElementById('f-amount').value;
  const id=nextId++;
  const doc={id,title,cat:editCat,
    date:document.getElementById('f-date').value||today(),
    amount:amt!==''?parseInt(amt):null,
    issuer:document.getElementById('f-issuer').value.trim(),
    memo:document.getElementById('f-memo').value.trim(),
    created:today(),aiClassified:false,hasFile:false,
    fileName:'',fileType:'',fileSize:0};
  await dbPut('docs',doc);
  closeSheet('add-sheet');
  await loadDocs();render();
  toastDone('保存しました');
}

// ── Cat Settings ──
let tempCats=[];
function openCatSettings(){tempCats=CATS.map(c=>({...c}));renderCatSetList();openSheet('cat-sheet')}
function closeCatSettings(){closeSheet('cat-sheet')}
function renderCatSetList(){
  document.getElementById('cat-set-list').innerHTML=tempCats.map((c,i)=>`
    <div class="cat-set-row">
      <input type="color" class="cs-color" value="${c.color}" onchange="tempCats[${i}].color=this.value;tempCats[${i}].bg=hexToBg(this.value)">
      <input type="text" class="cs-inp" value="${esc(c.label)}" placeholder="カテゴリ名" oninput="tempCats[${i}].label=this.value">
      <button class="cs-del" onclick="if(tempCats.length>1){tempCats.splice(${i},1);renderCatSetList()}else alert('カテゴリは1つ以上必要です')">
        <svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>`).join('');
}
function addNewCat(){
  const p=['#c0392b','#e67e22','#8e44ad','#16a085','#2980b9'];
  const color=p[tempCats.length%p.length];
  tempCats.push({id:'cat_'+Date.now(),label:'新しいカテゴリ',color,bg:hexToBg(color)});
  renderCatSetList();
  setTimeout(()=>{const ins=document.querySelectorAll('.cs-inp');if(ins.length)ins[ins.length-1].select()},50);
}
function saveCatSettings(){
  if(tempCats.some(c=>!c.label.trim())){alert('カテゴリ名を入力してください');return}
  CATS=tempCats.map(c=>({...c,label:c.label.trim()}));
  saveCatsLS(CATS);rebuildMap();closeCatSettings();render();toastDone('カテゴリを保存しました');
}

// ── Mobile category picker ──
function openMobileCats(){
  const el=document.getElementById('mcat-list');
  el.innerHTML=[{id:'all',label:'すべて',color:'#888',bg:'#eee'},...CATS].map(c=>`
    <button style="display:flex;align-items:center;gap:10px;width:100%;padding:12px 10px;border:none;background:${activeCat===c.id?c.bg:'transparent'};border-radius:9px;font-size:14px;color:${activeCat===c.id?c.color:'var(--text2)'};font-weight:${activeCat===c.id?'700':'400'}"
      onclick="mobileNavCat('${c.id}')">
      <span style="width:9px;height:9px;border-radius:50%;background:${c.color};flex-shrink:0"></span>
      ${esc(c.label)}
    </button>`).join('');
  openSheet('mcat-sheet');
}
function mobileNavCat(id){
  activeCat=id;
  closeSheet('mcat-sheet');
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('bnav-all').classList.toggle('active',id==='all');
  render();
}

// ── Render ──
function setSort(k){sortBy=k;document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));document.getElementById('s-'+k).classList.add('active');render()}
function setCategory(id){activeCat=id;render()}

function getFiltered(){
  const q=(document.getElementById('search-input').value||'').trim().toLowerCase();
  return docs.filter(d=>{
    const catOk=activeCat==='all'||d.cat===activeCat;
    const qOk=!q||[d.title,d.issuer,d.memo,d.fileName].some(x=>(x||'').toLowerCase().includes(q));
    return catOk&&qOk;
  }).sort((a,b)=>{
    if(sortBy==='date')return(b.date||'').localeCompare(a.date||'');
    if(sortBy==='name')return(a.title||'').localeCompare(b.title||'','ja');
    if(sortBy==='size')return(b.fileSize||0)-(a.fileSize||0);
    return 0;
  });
}

function renderSidebar(){
  const counts={all:docs.length};CATS.forEach(c=>{counts[c.id]=docs.filter(d=>d.cat===c.id).length});
  let h=`<div class="sb-head">カテゴリ</div>
  <button class="cat-btn ${activeCat==='all'?'active':''}" onclick="setCategory('all')">
    <span class="cat-dot" style="background:#888"></span><span class="cat-lbl">すべて</span><span class="cat-cnt">${counts.all}</span></button>`;
  CATS.forEach(c=>{h+=`<button class="cat-btn ${activeCat===c.id?'active':''}" onclick="setCategory('${c.id}')">
    <span class="cat-dot" style="background:${c.color}"></span><span class="cat-lbl">${esc(c.label)}</span>
    <span class="cat-cnt">${counts[c.id]||0}</span></button>`});
  document.getElementById('sidebar').innerHTML=h;
}

function renderList(){
  const list=getFiltered();
  document.getElementById('doc-cnt').textContent=`${list.length}件`;
  const dl=document.getElementById('doc-list');
  const dz=document.getElementById('drop-zone');
  dl.innerHTML='';
  if(dz)dl.appendChild(dz);else initDropZone();
  if(!list.length){
    const e=document.createElement('div');e.className='empty-state';
    e.innerHTML=`<svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>
    <p>まだファイルがありません<br>下の「保管」ボタンか<br>ここにドロップして追加</p>`;
    dl.appendChild(e);return;
  }
  list.forEach(d=>{
    const c=catMap[d.cat]||CATS[0]||{color:'#888',bg:'#eee',label:'不明'};
    const card=document.createElement('div');card.className='doc-card';card.onclick=()=>openDetail(d.id);
    card.innerHTML=`
      <div class="file-icon" style="background:${c.bg}">${fileIcon(d.fileName||d.title)}</div>
      <div class="doc-info">
        <div class="doc-title">${esc(d.title)}</div>
        <div class="doc-meta">
          <span class="doc-badge" style="background:${c.bg};color:${c.color}">${esc(c.label)}</span>
          <span class="doc-date">${fmtDate(d.date)}</span>
          ${d.fileName?`<span class="doc-size">${fileExt(d.fileName)}</span>`:''}
          ${d.fileSize?`<span class="doc-size">${fmtBytes(d.fileSize)}</span>`:''}
          ${d.aiClassified?`<span class="ai-badge">AI</span>`:''}
        </div>
      </div>
      ${d.amount?`<span class="doc-amount">${fmtAmt(d.amount)}</span>`:''}`;
    dl.appendChild(card);
  });
}

function render(){renderSidebar();renderList()}

function initDropZone(){
  const dl=document.getElementById('doc-list');
  const dz=document.createElement('div');dz.id='drop-zone';dz.className='drop-zone';
  dz.innerHTML=`
    <svg viewBox="0 0 24 24" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    <p>ファイル・フォルダをドラッグ＆ドロップ</p>
    <small>PDF・Word・Excel・画像・動画・ZIP など全形式対応<br>スマホは下の「保管」ボタンからファイルを選択</small>
    <input type="file" id="drop-file-input" multiple style="display:none">`;
  dl.appendChild(dz);
  dz.addEventListener('click',()=>document.getElementById('drop-file-input').click());
  document.getElementById('drop-file-input').addEventListener('change',e=>{const f=[...e.target.files];if(f.length)processFiles(f);e.target.value=''});
}

// ── Detail ──
function openDetail(id){
  const d=docs.find(x=>x.id===id);if(!d)return;
  selectedId=id;
  const c=catMap[d.cat]||CATS[0]||{color:'#888',bg:'#eee',label:'不明'};
  document.getElementById('d-sheet-ttl').textContent=d.title;
  document.getElementById('d-icon').textContent=fileIcon(d.fileName||d.title);
  document.getElementById('d-date').textContent=fmtDate(d.date);
  document.getElementById('d-amount').textContent=fmtAmt(d.amount);
  document.getElementById('d-issuer').textContent=d.issuer||'—';
  document.getElementById('d-ext').textContent=d.fileName?fileExt(d.fileName):'—';
  document.getElementById('d-size').textContent=d.fileSize?fmtBytes(d.fileSize):'—';
  document.getElementById('d-created').textContent=fmtDate(d.created);
  document.getElementById('d-ai').textContent=d.aiClassified?'AI自動分類':'手動登録';
  const ms=document.getElementById('d-memo-sec');
  if(d.memo){ms.style.display='block';document.getElementById('d-memo').textContent=d.memo}else ms.style.display='none';
  const fa=document.getElementById('d-file-actions');
  fa.style.display=d.hasFile?'flex':'none';
  openSheet('detail-sheet');
}

async function openFile(){
  if(!selectedId)return;
  const rec=await dbGet('files',selectedId);if(!rec)return;
  const blob=new Blob([rec.data],{type:rec.type});
  window.open(URL.createObjectURL(blob),'_blank');
}
async function downloadFile(){
  if(!selectedId)return;
  const rec=await dbGet('files',selectedId);if(!rec)return;
  const d=docs.find(x=>x.id===selectedId);
  const blob=new Blob([rec.data],{type:rec.type});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=rec.name||d?.title||'file';a.click();
}
async function deleteDoc(){
  if(!selectedId)return;
  if(!confirm('このファイルを削除しますか？'))return;
  await dbDel('docs',selectedId);await dbDel('files',selectedId);
  docs=docs.filter(d=>d.id!==selectedId);
  closeSheet('detail-sheet');render();toastDone('削除しました');
}

// ── PWA ──
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('install-banner').classList.add('visible')});
document.getElementById('btn-install').onclick=async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;document.getElementById('install-banner').classList.remove('visible')};

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeAllSheets()});
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});

// ── Init ──
// 起動時に全シートを強制クローズ（キャッシュ残存対策）
document.querySelectorAll('.sheet').forEach(s=>{s.classList.remove('open');s.style.display='none'});
const _bd=document.getElementById('sheet-backdrop');
_bd.classList.remove('visible');_bd.style.display='none';
activeSheets=[];

openDB().then(async()=>{
  await loadDocs();
  initDropZone();
  render();
  if(!getKey())document.getElementById('apikey-banner').classList.add('visible');
}).catch(e=>console.error('DB初期化エラー:',e));
</script>
